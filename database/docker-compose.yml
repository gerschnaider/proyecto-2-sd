version: '3.8'

services:
  database:
    build: .
    image: db-consorcio:1.0
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=secreta
      - POSTGRES_USER=admin
      - POSTGRES_DB=sistema_db
    networks:
      - consorcio-red

networks:
  consorcio-red:
    name: consorcio-red
    driver: bridge
