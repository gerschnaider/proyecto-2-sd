version: '3.8'

services:
  send_news:
    build: .
    ports:
      - "8765:8765" # Puerto WebSocket
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=sistema_db
      - DB_USER=admin
      - DB_PASSWORD=secreta
      - RABBITMQ_HOST=rabbitmq
    networks:
      - consorcio-red

networks:
  consorcio-red:
    external: true

