services:
  db:
    build:
      context: ../database
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: noticias_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d noticias_db"]
      interval: 2s
      timeout: 5s
      retries: 5

  last-news-24-hour-service:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: noticias_db
      FIND_NEWS_PERIOD_URL: http://find-news-service:8000/api/news-period
    ports:
      - "8000:8000"
